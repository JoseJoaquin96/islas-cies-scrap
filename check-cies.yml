name: Comprobar disponibilidad Illas Cíes

on:
  schedule:
    # Cada 20 minutos. Ajusta a tu gusto (cuidado con no abusar del servidor público).
    - cron: "*/20 * * * *"
  workflow_dispatch:
    inputs:
      inspect:
        description: "Ejecutar en modo --inspect (guarda capturas de depuración)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ejecutar comprobación (modo normal)
        if: ${{ github.event.inputs.inspect != 'true' }}
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python check_availability.py

      - name: Ejecutar en modo inspección
        if: ${{ github.event.inputs.inspect == 'true' }}
        run: python check_availability.py --inspect

      - name: Subir capturas de depuración
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 5

      - name: Guardar estado (para no repetir avisos)
        if: ${{ github.event.inputs.inspect != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Actualiza estado de disponibilidad [skip ci]"
          git push
